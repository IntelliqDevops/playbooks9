---
- name: check  if a file is executable and if it is delete it
  hosts: all
  tasks:
    - name: check for file1
      stat:
        path: /tmp/file1
      register: results
    - name: Display output of the above module
      debug:
        var: results
    - name: Delete if the file ie executable
      file:
        name: /tmp/file1
        state: absent
      when: results.stat.executable == true
